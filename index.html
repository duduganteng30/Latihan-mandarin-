<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Latihan Nada Mandarin Pro (Final Mobile Fix)</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --accent: #0284c7;
            --accent-hover: #0369a1;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 15px;
            line-height: 1.5;
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: var(--primary);
            font-size: 1.6rem;
            margin-bottom: 5px;
            font-weight: 800;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 20px;
            font-size: 0.85rem;
        }

        .section {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
            border: 1px solid #f1f5f9;
        }

        .section h2 {
            font-size: 1.15rem;
            margin-top: 0;
            color: #0f172a;
            border-left: 4px solid var(--primary);
            padding-left: 8px;
        }

        .sentence-card {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
        }

        .level-badge {
            display: inline-block;
            background: #e0e7ff;
            color: var(--primary);
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .hanzi-container {
            font-size: 22px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 10px;
            line-height: 1.5;
            word-break: break-all;
        }

        .pinyin {
            font-size: 14px;
            color: var(--primary);
            background: #eef2f6;
            padding: 8px;
            border-radius: 6px;
            margin-bottom: 8px;
            font-weight: 500;
            display: none;
        }

        .translation {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 15px;
        }

        .controls {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            min-width: 100px;
            padding: 12px 10px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .btn-primary { background-color: var(--primary); color: white; }
        .btn-secondary { background-color: #e2e8f0; color: #334155; }
        .btn-accent { background-color: var(--accent); color: white; }
        
        button.recording { 
            background-color: var(--danger) !important; 
            color: white; 
            animation: pulse 1s infinite;
        }

        .result-box {
            margin-top: 15px;
            padding: 15px;
            background: #ffffff;
            border-radius: 12px;
            border: 2px solid #e2e8f0;
        }

        .score-large {
            font-size: 36px;
            font-weight: 900;
            text-align: center;
        }

        .diff-display {
            font-size: 18px;
            letter-spacing: 2px;
            padding: 10px;
            background: #f1f5f9;
            border-radius: 8px;
            margin-bottom: 10px;
            text-align: center;
            word-break: break-all;
        }

        .char-match { color: var(--success); font-weight: bold; }
        .char-miss { color: var(--danger); font-weight: bold; }

        .feedback-list {
            background: #fff5f5;
            border-left: 4px solid var(--danger);
            padding: 10px;
            font-size: 12px;
        }

        textarea {
            width: 100%; height: 70px; padding: 10px; font-size: 14px;
            border: 1px solid #cbd5e1; border-radius: 10px; resize: none;
            margin-bottom: 10px; box-sizing: border-box;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Latihan Mandarain Mobile Fix</h1>
    <div class="subtitle">Solusi Kompetibel Safari iOS & Chrome Android</div>
    
    <div class="section">
        <h2>Kalimat Acak</h2>
        <div id="active-card-container"></div>
    </div>

    <div class="section">
        <h2>Teks Kustom</h2>
        <textarea id="custom-text" placeholder="Tempel kalimat Mandarin Tradisional di sini..."></textarea>
        <div class="controls">
            <button id="btn-custom-record" class="btn-primary" onclick="handleCustomRecordClick()">🎙️ Bicara</button>
            <button class="btn-accent" onclick="speakCustom()">🔊 Dengar (0.7x)</button>
            <button class="btn-secondary" onclick="clearCustom()">🔄 Reset</button>
        </div>
        <div class="result-box" id="custom-result" style="display: none;">
            <div class="score-large" id="custom-score-display">0</div>
            <div class="diff-display" id="custom-diff"></div>
            <div class="feedback-list" id="custom-analysis-box" style="display:none;">
                <ul id="custom-analysis-details"></ul>
            </div>
        </div>
    </div>
</div>

<script>
    const sentencePool = [
        {
            level: "B1",
            hanzi: "儘管大家的意見不同，我們還是找到了一個大家都能接受的方案。",
            pinyin: "Jǐnguǎn dàjiā de yìjiàn bùtóng, wǒmen háishì zhǎodào le yí gè dàjiā dōu néng jiēshòu de fāng'àn.",
            tones: "33415444223524451421411514",
            translation: "Mesenkipun pendapat semua orang berbeda, kami tetap menemukan solusi yang bisa diterima semua pihak."
        },
        {
            level: "B2",
            hanzi: "一旦決定了目標，就應該全力以赴，不要輕易改變方向。",
            pinyin: "Yídàn juédìng le mùbiāo, jiù yīnggāi quánlì yǐ fù, búyào qīngyì gǎibiàn fāngxiàng.",
            tones: "142454141124342414443414",
            translation: "Begitu sudah menentukan tujuan, kita harus berusaha sebaik mungkin dan tidak mudah mengubah arah."
        }
        // Tambahkan 104 daftar kalimat lainnya di sini...
    ];

    let currentSentenceIndex = 0;
    let recognition = null;
    let isListening = false;
    let currentTranscript = "";
    let globalActiveMode = ""; // 'predefined' atau 'custom'

    // Inisialisasi awal Web Speech API yang aman untuk HP
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition || window.mozSpeechRecognition || window.msSpeechRecognition;

    function renderNewSentence() {
        if(isListening) stopSpeechEngine();
        currentSentenceIndex = Math.floor(Math.random() * sentencePool.length);
        const item = sentencePool[currentSentenceIndex];

        const container = document.getElementById('active-card-container');
        container.innerHTML = `
            <div class="sentence-card">
                <span class="level-badge">TOCFL ${item.level}</span>
                <div class="hanzi-container" onclick="togglePinyin()">
                    ${item.hanzi}
                </div>
                <div class="pinyin" id="predefined-pinyin">${item.pinyin}</div>
                <div class="translation"><b>Arti:</b> ${item.translation}</div>
                
                <div class="controls">
                    <button id="btn-record" class="btn-primary" onclick="handlePredefinedRecordClick()">🎙️ Bicara</button>
                    <button class="btn-accent" onclick="speakCurrentSentence()">🔊 Dengar (0.7x)</button>
                    <button class="btn-secondary" onclick="renderNewSentence()">🔄 Acak</button>
                </div>

                <div class="result-box" id="result-box" style="display: none;">
                    <div class="score-large" id="score-display">0</div>
                    <div class="diff-display" id="diff-display"></div>
                    <div class="feedback-list" id="analysis-box" style="display:none;">
                        <ul id="analysis-details"></ul>
                    </div>
                </div>
            </div>
        `;
    }

    function initSpeechEngine() {
        if (!SpeechRecognition) {
            alert("Browser HP Anda tidak mengizinkan perekaman SpeechRecognition otomatis.");
            return false;
        }
        
        recognition = new SpeechRecognition();
        recognition.lang = 'zh-TW'; // Fokus penuh aksen terpusat Taiwan
        recognition.continuous = true; 
        recognition.interimResults = true; // Tangkap suara secara real-time demi Safari iOS

        recognition.onresult = (event) => {
            let resultText = "";
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                resultText += event.results[i][0].transcript;
            }
            currentTranscript = resultText;
            console.log("Suara masuk mobile: ", currentTranscript);
        };

        recognition.onerror = (e) => {
            console.log("Speech Error:", e.error);
            if(e.error === 'not-allowed') {
                alert("Akses mic ditolak. Silakan aktifkan izin mic di pengaturan browser Chrome/Safari HP Anda.");
            }
        };

        recognition.onend = () => {
            // Evaluasi paksa ketika engine mati secara mekanis
            if (isListening) {
                processEvaluation();
            }
        };
        return true;
    }

    function handlePredefinedRecordClick() {
        globalActiveMode = "predefined";
        if (!isListening) {
            startSpeechEngine(document.getElementById('btn-record'));
        } else {
            stopSpeechEngine();
        }
    }

    function handleCustomRecordClick() {
        globalActiveMode = "custom";
        const customText = document.getElementById('custom-text').value.trim();
        if(!customText) { alert("Teks kustom kosong!"); return; }
        
        if (!isListening) {
            startSpeechEngine(document.getElementById('btn-custom-record'));
        } else {
            stopSpeechEngine();
        }
    }

    function startSpeechEngine(targetButton) {
        currentTranscript = "";
        const initSuccess = initSpeechEngine();
        if(!initSuccess) return;

        try {
            recognition.start();
            isListening = true;
            targetButton.innerText = "🛑 Ketuk Selesai";
            targetButton.classList.add("recording");
            
            // Sembunyikan box hasil lama jika ada
            if(globalActiveMode === "predefined") {
                document.getElementById('result-box').style.display = "none";
            } else {
                document.getElementById('custom-result').style.display = "none";
            }
        } catch(e) {
            console.log("Start crash:", e);
        }
    }

    function stopSpeechEngine() {
        isListening = false;
        if (recognition) {
            try { recognition.stop(); } catch(e){}
        }
        
        // Kembalikan UI Tombol asal semula
        const btnPre = document.getElementById('btn-record');
        if(btnPre) { btnPre.innerText = "🎙️ Bicara"; btnPre.classList.remove("recording"); }
        const btnCus = document.getElementById('btn-custom-record');
        if(btnCus) { btnCus.innerText = "🎙️ Bicara"; btnCus.classList.remove("recording"); }

        // Eksekusi penilaian instan
        processEvaluation();
    }

    function processEvaluation() {
        const item = sentencePool[currentSentenceIndex];
        const customText = document.getElementById('custom-text').value.trim();
        
        let targetText = (globalActiveMode === "predefined") ? item.hanzi : customText;
        let diffDisp = (globalActiveMode === "predefined") ? document.getElementById('diff-display') : document.getElementById('custom-diff');
        let anaBox = (globalActiveMode === "predefined") ? document.getElementById('analysis-box') : document.getElementById('custom-analysis-box');
        let anaDet = (globalActiveMode === "predefined") ? document.getElementById('analysis-details') : document.getElementById('custom-analysis-details');
        let rBox = (globalActiveMode === "predefined") ? document.getElementById('result-box') : document.getElementById('custom-result');
        let scoreDisp = (globalActiveMode === "predefined") ? document.getElementById('score-display') : document.getElementById('custom-score-display');

        if(!targetText) return;

        // Bersihkan tanda baca
        const cleanTarget = targetText.replace(/[。，、！？\s]/g, '');
        const cleanTranscript = currentTranscript.replace(/[。，、！？\s]/g, '');

        let htmlDiff = "";
        let matchCount = 0;
        let mistakes = [];
        let tIndex = 0;

        for (let i = 0; i < cleanTarget.length; i++) {
            let char = cleanTarget[i];
            let foundIndex = cleanTranscript.indexOf(char, tIndex);

            if (foundIndex !== -1) {
                htmlDiff += `<span class="char-match">${char}</span>`;
                tIndex = foundIndex + 1;
                matchCount++;
            } else {
                htmlDiff += `<span class="char-miss">${char}</span>`;
                let expectedTone = (globalActiveMode === "predefined" && item.tones) ? item.tones[i] : null;
                let toneStr = expectedTone ? ` (Nada ${expectedTone})` : "";
                mistakes.push(`<b>"${char}"</b> tidak pas${toneStr}`);
            }
        }

        diffDisp.innerHTML = htmlDiff;
        anaDet.innerHTML = "";
        
        if (mistakes.length > 0) {
            anaBox.style.style = "block";
            mistakes.slice(0, 5).forEach(m => { // Batasi 5 baris kesalahan di layar kecil HP
                let li = document.createElement('li');
                li.innerHTML = m;
                anaDet.appendChild(li);
            });
        } else {
            anaDet.innerHTML = "<li style='color:var(--success); list-style:none;'>🎉 100% Sempurna!</li>";
        }

        let score = Math.round((matchCount / cleanTarget.length) * 100);
        if(isNaN(score)) score = 0;
        
        scoreDisp.innerText = score + " %";
        scoreDisp.style.color = score >= 75 ? "var(--success)" : "var(--danger)";
        
        rBox.style.display = "block";
        anaBox.style.display = "block";
    }

    function playAudioTaiwan(text) {
        if (!('speechSynthesis' in window)) return;
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-TW';
        utterance.rate = 0.7;
        const voices = window.speechSynthesis.getVoices();
        const twVoice = voices.find(v => v.lang === 'zh-TW' || v.lang.includes('bzh-TW'));
        if (twVoice) utterance.voice = twVoice;
        window.speechSynthesis.speak(utterance);
    }

    function speakCurrentSentence() { playAudioTaiwan(sentencePool[currentSentenceIndex].hanzi); }
    function speakCustom() { playAudioTaiwan(document.getElementById('custom-text').value.trim()); }
    function togglePinyin() {
        const p = document.getElementById('predefined-pinyin');
        if(p) p.style.display = (p.style.display === "none") ? "block" : "none";
    }
    function clearCustom() {
        if(isListening) stopSpeechEngine();
        document.getElementById('custom-text').value = "";
        document.getElementById('custom-result').style.display = "none";
    }

    window.onload = () => {
        renderNewSentence();
    };
</script>
</body>
</html>
